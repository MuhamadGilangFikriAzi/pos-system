services:
  app:
    image: pos-system-app
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pos-system-app
    restart: unless-stopped
    ports:
      - "8095:80"
    volumes:
      - ./laravel:/var/www/html
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=pos_system
      - DB_USERNAME=pos_user
      - DB_PASSWORD=pos_password
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: pos-system-db
    restart: unless-stopped
    environment:
      - MYSQL_DATABASE=pos_system
      - MYSQL_USER=pos_user
      - MYSQL_PASSWORD=pos_password
      - MYSQL_ROOT_PASSWORD=root_password
    ports:
      - "3310:3306"
    volumes:
      - pos_db_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: pos-system-pma
    restart: unless-stopped
    ports:
      - "8096:80"
    environment:
      - PMA_HOST=db
      - PMA_USER=pos_user
      - PMA_PASSWORD=pos_password
    depends_on:
      - db

volumes:
  pos_db_data:
